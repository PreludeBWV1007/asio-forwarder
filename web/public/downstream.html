<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>asio-forwarder | 下游管理</title>
    <link rel="stylesheet" href="/app.css" />
    <script defer src="/common.js"></script>
  </head>
  <body>
    <div class="topbar">
      <div class="wrap">
        <div class="brand">
          <h1>asio-forwarder</h1>
          <span class="tag">下游管理（连接池）</span>
        </div>
        <div class="nav">
          <a href="/index.html">大屏</a>
          <a href="/upstream.html">上游发包</a>
          <a href="/downstream.html">下游管理</a>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="grid">
        <div class="card wide">
          <h2>连接池管理</h2>
          <div class="grid" style="grid-template-columns: repeat(12, 1fr); gap: 10px;">
            <div style="grid-column: span 3; display:flex; align-items:end;">
              <button id="btnAdd" style="width:100%;">新增连接</button>
            </div>
            <div style="grid-column: span 3; display:flex; align-items:end;">
              <button id="btnRefresh" class="secondary" style="width:100%;">刷新列表</button>
            </div>
            <div style="grid-column: span 6;">
              <div class="hint">连接池状态</div>
              <div class="pill mono" id="poolMeta">-</div>
            </div>
          </div>
          <div style="height: 10px;"></div>
          <div class="row">
            <span class="pill mono" id="meta">loading…</span>
          </div>
          <div class="hint" style="margin-top: 10px;">
            说明：这里的“下游连接”指 sidecar 主动创建的下游 TCP 客户端连接。每条连接都有独立的接收记录与详情页入口。
          </div>
        </div>

        <div class="card wide" style="padding: 0;">
          <table>
            <thead>
              <tr>
                <th style="width: 70px;">id</th>
                <th style="width: 120px;">connected</th>
                <th style="width: 140px;">connected_at</th>
                <th style="width: 110px;">frames_ring</th>
                <th style="width: 260px;">last_error</th>
                <th>入口</th>
                <th style="width: 110px;">操作</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
      const c = window.__common;
      if (!c) throw new Error('common.js not loaded');
      c.setActiveNav();

      const tbody = document.getElementById('tbody');
      const meta = document.getElementById('meta');
      const poolMeta = document.getElementById('poolMeta');
      const escapeHtml = (s) => String(s || '').replace(/</g, '&lt;');

      function renderSlots(slots) {
        tbody.innerHTML = slots.map(s => {
          const when = s.connected_at_ms ? new Date(s.connected_at_ms).toLocaleTimeString() : '-';
          const link = `/downstream_conn.html?conn_id=${encodeURIComponent(s.id)}`;
          return `<tr>
            <td>${s.id}</td>
            <td>${s.connected ? '<span class="pill mono">yes</span>' : '<span class="pill mono">no</span>'}</td>
            <td class="small">${when}</td>
            <td>${s.frames_ring}</td>
            <td class="small">${escapeHtml(s.last_error || '-')}</td>
            <td><a href="${link}">查看详情</a></td>
            <td><button class="danger" data-del-id="${s.id}">删除</button></td>
          </tr>`;
        }).join('');
      }

      document.getElementById('btnAdd').addEventListener('click', async () => {
        try {
          const r = await fetch('/api/downstream/add', {
            method: 'POST',
          });
          const js = await r.json();
          if (!js.ok) throw new Error(js.error || 'add_failed');
          poolMeta.textContent = `added id=${js.id}`;
          refreshPoolStatus();
        } catch (e) {
          poolMeta.textContent = `add failed: ${String(e)}`;
        }
      });

      tbody.addEventListener('click', async (ev) => {
        const btn = ev.target && ev.target.closest ? ev.target.closest('button[data-del-id]') : null;
        if (!btn) return;
        const id = parseInt(btn.getAttribute('data-del-id'), 10);
        if (!Number.isFinite(id)) return;
        try {
          const r = await fetch('/api/downstream/remove', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id }),
          });
          const js = await r.json();
          if (!js.ok) throw new Error(js.error || 'remove_failed');
          poolMeta.textContent = `removed id=${id}`;
          refreshPoolStatus();
        } catch (e) {
          poolMeta.textContent = `remove failed: ${String(e)}`;
        }
      });

      async function refreshPoolStatus() {
        try {
          const r = await fetch('/api/downstream/status', { cache: 'no-store' });
          const js = await r.json();
          poolMeta.textContent = `total=${js.desired} active=${js.active} slots=${js.slots.length}`;
          meta.textContent = `ok | active=${js.active}`;
          renderSlots(js.slots);
        } catch (e) {
          poolMeta.textContent = `status failed: ${String(e)}`;
          meta.textContent = 'failed';
        }
      }

      document.getElementById('btnRefresh').addEventListener('click', refreshPoolStatus);
      refreshPoolStatus();
      setInterval(refreshPoolStatus, 2000);
      });
    </script>
  </body>
</html>
