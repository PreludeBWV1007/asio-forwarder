<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>asio-forwarder | 监控大屏</title>
    <link rel="stylesheet" href="/app.css" />
    <script defer src="/common.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="topbar">
      <div class="wrap">
        <div class="brand">
          <h1>asio-forwarder</h1>
          <span class="tag">监控大屏（sidecar）</span>
        </div>
        <div class="nav">
          <a href="/index.html">大屏</a>
          <a href="/upstream.html">上游发包</a>
          <a href="/downstream.html">下游管理</a>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="grid">
        <div class="card third">
          <h2>连接状态</h2>
          <div class="kpi">
            <div class="label">上游连接</div>
            <div id="kUp" class="value">-</div>
          </div>
          <div class="kpi">
            <div class="label">下游在线</div>
            <div id="kDown" class="value">-</div>
          </div>
          <div class="kpi">
            <div class="label">SSE 客户端</div>
            <div id="kSse" class="value">-</div>
          </div>
          <div class="hint">提示：上游只有 1 条连接槽位。使用“上游发包”会占用该槽位（调试模式）。</div>
        </div>

        <div class="card third">
          <h2>吞吐（瞬时）</h2>
          <div class="kpi">
            <div class="label">frames in</div>
            <div id="kFin" class="value">-</div>
          </div>
          <div class="kpi">
            <div class="label">bytes in</div>
            <div id="kBin" class="value">-</div>
          </div>
          <div class="kpi">
            <div class="label">drops</div>
            <div id="kDrops" class="value">-</div>
          </div>
        </div>

        <div class="card third">
          <h2>队列与健康</h2>
          <div class="kpi">
            <div class="label">下游待发送总字节</div>
            <div id="kPending" class="value">-</div>
          </div>
          <div class="kpi">
            <div class="label">admin 连通性</div>
            <div id="kAdmin" class="value">-</div>
          </div>
          <div class="kpi">
            <div class="label">最近错误</div>
            <div id="kErr" class="value small">-</div>
          </div>
        </div>

        <div class="card half">
          <h2>frames/s（最近 60s）</h2>
          <canvas id="chartFrames" height="120"></canvas>
        </div>

        <div class="card half">
          <h2>bytes/s（最近 60s）</h2>
          <canvas id="chartBytes" height="120"></canvas>
        </div>

        <div class="card wide">
          <h2>事件（来自转发器 /api/events）</h2>
          <div class="row">
            <button id="btnRefresh" class="secondary">刷新</button>
            <span class="pill mono" id="evMeta">-</span>
          </div>
          <div id="evLog" class="log" style="margin-top: 10px;"></div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
      const c = window.__common;
      if (!c) throw new Error('common.js not loaded');
      const { fmtBytes } = c;
      c.setActiveNav();

      const state = {
        last: null,
        points: [],
        maxPoints: 60,
      };

      function mkLineChart(el, label) {
        const ctx = el.getContext('2d');
        return new Chart(ctx, {
          type: 'line',
          data: { labels: [], datasets: [{ label, data: [], borderWidth: 2, tension: 0.25, pointRadius: 0 }] },
          options: {
            responsive: true,
            animation: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: 'rgba(255,255,255,0.6)' }, grid: { color: 'rgba(255,255,255,0.08)' } },
              y: { ticks: { color: 'rgba(255,255,255,0.6)' }, grid: { color: 'rgba(255,255,255,0.08)' } },
            },
          },
        });
      }

      const cFrames = mkLineChart(document.getElementById('chartFrames'), 'frames/s');
      const cBytes = mkLineChart(document.getElementById('chartBytes'), 'bytes/s');

      function pushPoint(tsLabel, framesPerSec, bytesPerSec) {
        state.points.push({ tsLabel, framesPerSec, bytesPerSec });
        while (state.points.length > state.maxPoints) state.points.shift();

        cFrames.data.labels = state.points.map(p => p.tsLabel);
        cFrames.data.datasets[0].data = state.points.map(p => p.framesPerSec);
        cFrames.update();

        cBytes.data.labels = state.points.map(p => p.tsLabel);
        cBytes.data.datasets[0].data = state.points.map(p => p.bytesPerSec);
        cBytes.update();
      }

      function setValue(id, text, cls) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = el.className.replace(/\b(ok|warn|bad)\b/g, '').trim();
        if (cls) el.classList.add(cls);
      }

      async function refreshStats() {
        let js = null;
        try {
          const r = await fetch('/api/stats', { cache: 'no-store' });
          js = await r.json();
        } catch (e) {
          setValue('kAdmin', '不可用', 'bad');
          setValue('kErr', String(e), null);
          return;
        }

        const fwd = js.forwarder;
        const err = js.forwarder_error || '';
        setValue('kAdmin', fwd ? 'OK' : '不可用', fwd ? 'ok' : 'bad');
        setValue('kErr', err || '-', err ? 'warn' : null);
        setValue('kSse', String(js.sidecar.sse_clients), null);

        if (!fwd) return;

        setValue('kUp', fwd.upstream_connected ? '在线' : '离线', fwd.upstream_connected ? 'ok' : 'warn');
        setValue('kDown', String(fwd.downstream_alive), fwd.downstream_alive > 0 ? 'ok' : 'warn');
        setValue('kFin', String(fwd.frames_in), null);
        setValue('kBin', fmtBytes(fwd.bytes_in), null);
        setValue('kDrops', String(fwd.drops), fwd.drops > 0 ? 'warn' : null);
        setValue('kPending', fmtBytes(fwd.downstream_pending_bytes), fwd.downstream_pending_bytes > 0 ? 'warn' : 'ok');

        if (state.last) {
          const dt = Math.max(0.2, (fwd.ts_ms - state.last.ts_ms) / 1000);
          const dFrames = fwd.frames_in - state.last.frames_in;
          const dBytes = fwd.bytes_in - state.last.bytes_in;
          const framesPerSec = dFrames / dt;
          const bytesPerSec = dBytes / dt;
          const t = new Date(fwd.ts_ms).toLocaleTimeString();
          pushPoint(t, framesPerSec, bytesPerSec);
        }
        state.last = fwd;
      }

      async function refreshEvents() {
        const log = document.getElementById('evLog');
        const meta = document.getElementById('evMeta');
        try {
          const r = await fetch('/api/events', { cache: 'no-store' });
          const js = await r.json();
          const ev = js.events || [];
          meta.textContent = `events=${ev.length}`;
          log.textContent = ev.map(e => `${new Date(e.ts_ms).toLocaleTimeString()} [${e.level}] ${e.msg}`).join('\n') || '(empty)';
        } catch (e) {
          meta.textContent = 'events=0';
          log.textContent = `fetch failed: ${String(e)}`;
        }
      }

      document.getElementById('btnRefresh').addEventListener('click', refreshEvents);

      refreshStats();
      refreshEvents();
      setInterval(refreshStats, 1000);
      setInterval(refreshEvents, 5000);
      });
    </script>
  </body>
</html>
