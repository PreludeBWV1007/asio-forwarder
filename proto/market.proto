// 业务载荷契约：与外层 24B Header（见 docs/protocol.md）配合使用；转发器不解析 Body。
syntax = "proto3";

package fwd.market;

// 与 Header.msg_type 对齐的约定值（团队可扩展，需同步文档与收端分发逻辑）。
enum WireMsgType {
  WIRE_MSG_TYPE_UNSPECIFIED = 0;
  STOCK_QUOTE = 100;
  HEARTBEAT = 101;
  // Body 为 MarketPayload（oneof），便于收端单次 Parse 再分支。
  MARKET_PAYLOAD = 102;
}

// 单条证券报价快照。
message StockQuote {
  string symbol = 1;
  double last_price = 2;
  int64 volume = 3;
  int64 ts_ms = 4;
  string exchange = 5;
}

// 保活 / 对时等轻量消息。
message Heartbeat {
  int64 ts_ms = 1;
  string node_id = 2;
}

// 可选：单 Body 内承载多种消息（适合希望收端只调用一次 Parse 的场景）。
message MarketPayload {
  oneof payload {
    StockQuote stock_quote = 1;
    Heartbeat heartbeat = 2;
  }
}
